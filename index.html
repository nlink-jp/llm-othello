<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Othello</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>LLM Othello</h1>
  <p class="subtitle">あなた (黒) vs LLM (白)</p>
  <div id="game-container">
    <div id="board"></div>
    <div id="message"></div>
    <div id="error"></div>
    <div id="reason-box">
      <div id="reason-label">LLMの思考</div>
      <div id="reason"></div>
    </div>
    <button id="reset-button">リセット</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
